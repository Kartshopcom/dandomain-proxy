<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTK Ordre Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
.header { background: #1a1a18; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 16px; font-weight: 500; }
.header .date { font-size: 13px; color: #aaa; margin-left: auto; }
.setup { max-width: 440px; margin: 3rem auto; background: #fff; border-radius: 12px; border: 1px solid #e0dfd8; padding: 1.5rem; }
.setup h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
.field input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
.btn { width: 100%; padding: 10px; background: #1a1a18; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn:hover { background: #333; }
.main { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: #fff; border: 1px solid #e0dfd8; border-radius: 10px; padding: 14px 16px; }
.stat .lbl { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat .val { font-size: 22px; font-weight: 500; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.refresh-btn { padding: 7px 14px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e0dfd8; font-size: 13px; }
th { text-align: left; padding: 10px 14px; background: #f9f8f5; font-weight: 500; font-size: 12px; color: #666; border-bottom: 1px solid #e0dfd8; }
td { padding: 10px 14px; border-bottom: 1px solid #f0efe8; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf7; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
.badge-ok { background: #eaf3de; color: #3b6d11; }
.badge-none { background: #f1efe8; color: #5f5e5a; }
.badge-warn { background: #faeeda; color: #854f0b; }
a.track { display: inline-block; padding: 4px 10px; background: #1a1a18; color: #fff; border-radius: 6px; font-size: 11px; text-decoration: none; }
a.track:hover { background: #333; }
.empty { text-align: center; padding: 3rem; color: #888; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #555; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>OTK Shop · Ordre tracker</h1>
  <span class="date" id="today"></span>
</div>

<div id="setup" class="setup">
  <h2>Log ind</h2>
  <div class="field">
    <label>DanDomain API-nøgle</label>
    <input type="password" id="dd-key" placeholder="89d2be47-..." />
  </div>
  <div class="field">
    <label>Webshipper API-nøgle</label>
    <input type="password" id="ws-key" placeholder="268f2fb0..." />
  </div>
  <button class="btn" onclick="load()">Hent ordrer (48 timer)</button>
</div>

<div id="main" class="main" style="display:none">
  <div class="toolbar">
    <span style="font-size:14px;font-weight:500">Ordrer — seneste 48 timer</span>
    <button class="refresh-btn" onclick="load()">↻ Opdater</button>
    <span style="font-size:12px;color:#888;margin-left:auto">Sidst opdateret: <span id="updated">—</span></span>
    <button onclick="document.getElementById('setup').style.display='block';document.getElementById('main').style.display='none'" style="padding:7px 12px;background:#fff;border:1px solid #ccc;border-radius:8px;font-size:12px;cursor:pointer;">Skift nøgler</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="lbl">Ordrer i alt</div><div class="val" id="s-total">—</div></div>
    <div class="stat"><div class="lbl">Med tracking link</div><div class="val" id="s-track">—</div></div>
    <div class="stat"><div class="lbl">Ingen tracking</div><div class="val" id="s-notrack">—</div></div>
  </div>
  <table>
    <thead>
      <tr>
        <th>Ordre #</th>
        <th>Dato</th>
        <th>Kunde</th>
        <th>Carrier</th>
        <th>Tracking nr.</th>
        <th>Track</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const PROXY = 'https://dandomain-proxy-production.up.railway.app';
document.getElementById('today').textContent = new Date().toLocaleDateString('da-DK', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

function fmtDate(raw) {
  const ms = (raw || '').replace(/\/Date\((\d+).*\)\//, '$1');
  return ms ? new Date(+ms).toLocaleString('da-DK', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
}

let orders = [];
const wsMap = {};

async function load() {
  const ddKey = document.getElementById('dd-key').value.trim();
  const wsKey = document.getElementById('ws-key').value.trim();
  if (!ddKey || !wsKey) return alert('Udfyld begge API-nøgler');
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty"><span class="spinner"></span> Henter ordrer...</td></tr>';

  try {
    const r = await fetch(PROXY + '/ordrer?key=' + encodeURIComponent(ddKey));
    orders = await r.json();
    if (!Array.isArray(orders)) throw new Error(orders.error || 'Ukendt fejl');
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty" style="color:#a32d2d">Fejl: ' + e.message + '</td></tr>';
    return;
  }

  document.getElementById('s-total').textContent = orders.length;
  document.getElementById('updated').textContent = new Date().toLocaleTimeString('da-DK');
  renderRows();

  // Hent Webshipper tracking URL for alle ordrer parallelt
  await Promise.all(orders.map(async o => {
    try {
      const r = await fetch(PROXY + '/tracking?ref=' + o.id + '&wsKey=' + encodeURIComponent(wsKey));
      wsMap[o.id] = await r.json();
    } catch {
      wsMap[o.id] = { found: false };
    }
    renderRows();
  }));

  const withTrack = Object.values(wsMap).filter(t => t.found && t.tracking_url).length;
  document.getElementById('s-track').textContent = withTrack;
  document.getElementById('s-notrack').textContent = orders.length - withTrack;
}

function renderRows() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = orders.map(o => {
    const name = (o.customerInfo && o.customerInfo.name) || '—';
    const t = wsMap[o.id];
    let carrier = '—', trackNum = '—', trackLink = '—';

    if (!t) {
      trackLink = '<span class="spinner"></span>';
    } else if (!t.found) {
      trackLink = '<span class="badge badge-none">Ikke sendt endnu</span>';
    } else {
      carrier = t.carrier || '—';
      trackNum = t.tracking_number || (o.trackingNumber || '—');
      trackLink = t.tracking_url
        ? '<a class="track" href="' + t.tracking_url + '" target="_blank">Spor pakke ↗</a>'
        : '<span class="badge badge-warn">Ingen link</span>';
    }

    return '<tr><td>#' + o.id + '</td><td>' + fmtDate(o.createdDate) + '</td><td>' + name + '</td><td>' + carrier + '</td><td>' + trackNum + '</td><td>' + trackLink + '</td></tr>';
  }).join('');
}
</script>
</body>
</html>
